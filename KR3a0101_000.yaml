body:
  text: 欽定四庫全書子部一御定資政要覽儒家類提要臣等謹案御定資政要覽三卷後序一卷順治十二年世祖章皇帝御撰凡三十章曰君道曰臣道曰父道曰子道曰夫道曰婦道曰友道曰體仁曰宏義曰敦禮曰察微曰昭信曰知人曰厚生曰教化曰儉徳曰遷善曰務學曰重農曰睦親曰積善曰愛民曰慈幼曰懲忿曰窒欲曰履謙曰謹言曰慎行曰愛物每篇皆有箋注亦御撰也體裁雖仿周秦諸子而鎔鑄古籍闡為聖謨義理一本於經法戒兼裁于史大㫖闡明修身齊家之道又多為羣臣百姓而言伏考堯典有曰平章百姓百姓昭明恊和萬邦黎民於變時雍又説命有曰惟天聰明惟聖時憲惟臣欽若惟民從乂盖治天下者治臣民而已矣使百官咸禔躬飭行以奉其職守萬姓咸講讓型仁以厚其風俗則唐虞三代之治不過如斯明之季年三綱淪而九法斁讒妄興於上姦宄生於下日偷日薄人心壊而國運隨之天數乃終世祖章皇帝監夏監殷深知勝國之所以敗故丁寧誥誡親著是書俾朝野咸知所激勸而共躋太平御題曰資政要覽見澄叙官方敦崇世教為保邦之切務聖人之情見乎詞矣𫝊諸萬年所宜聰聴而敬守也乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀御製資政要覽序朕惟帝王為政賢哲修身莫不本於徳而成於學如大匠以規矩而取方圓樂師以六律而正五音凡古人嘉言善行載於典籍者皆修巳治人之方可施於今者也朕孜孜圖治學於古訓覽四書五經通鑑等編得其梗槩推之十三經二十一史及諸子之不悖於聖經者莫不根極理道成一家言但卷袠浩繁若以之教人恐未能一時盡解其義亦未能一時盡得其書因思夫記事宜提其要纂言當鈎其𤣥乃採集諸書中之闗於政事者為三十篇又慮其渙而無統於是每篇貫以大義聮以文詞於忠臣孝子賢人㢘吏略舉事迹其奸貪不肖悖亂者亦載其内使法戒炯然加之訓詁詳其證據譬之萃衆白以為裘範六金而成鼎㫖約而易明文簡而易閲名曰資政要覽觀是書者熟思而體之可以為篤行之善人推類而廣之可以為博雅之君子毋徒求之語言文字之間則朕諄諄教喻之心庶乎其不虚矣順治十二年正月吉日序
