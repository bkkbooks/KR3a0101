body:
  text: 欽定四庫全書御定資政要覽卷三積善章第二十一善者天人所以授受故曰繼之者善也若川然有原以卭浦而後大欲盡人以合天必謹正其所積積善者不期慶而慶臻焉鼓宫宫動鼓角角動山雲草莽雨雲水波黃帝曰芒昧因天之威與元同氣是以堯為善而衆善至周積忠厚漢積寬仁咸昌厥祚天道彰矣繼之者善出易經若川然冇原以卭浦而後大出國語凡樂器皆有五音鼓宫則衆器之宫音皆應鼓角則衆器之角音皆應蓋以類相感也黃帝之言及堯為善而衆善至俱出吕覽積善者當明乎善之原善也者天以是授之於人人以是受之於天故易曰繼之者善蓋人之有性所以繼天之命純乎至善而無有不善也自有生之初而言則謂之繼自有生以後而言則謂之積人性之善雖足乎已無待乎外然至善之道必合內外而後成是若川然既有源矣以卭於浦滙合衆流然後能成其大故欲盡人之性以合天之命者必謹正其所積善之積初非有意於求慶也而慶自臻焉蓋天人之間渾然一氣密相感應鼓宫而宫皆動鼓角而角皆動氣之徴於聲者也山雲之似草莽雨雲之似水波氣之見於形者也黃帝之言曰芒芒昧昧無有窮際因天之威罔敢不敬乃應乎天與元同氣可見天人雖分木嘗不合矣是以堯為善而衆善集克其立善之極者乎周自文武至於成康世傳忠厚之心漢自髙惠至於文景厯敷寬仁之政用能貽謀子孫享國久長克昌厥祚豈非積善之慶歟天之於人報施不爽於斯彰矣積善於身者行不愧影寢不愧魂積善於家者宗族稱孝鄉黨稱弟若乃扶危難恤羈孤念乏絶通有無危言切諫以申幽慎罰緩刑而全物所謂邁種其德者乎田蚡飛語義縱摯擊牛輔筮殺劉瑀呌呼殘忍怨毒嗟何益哉行不愧影寢不愧魂者如衛武公之詩曰相在爾室尚不愧於屋漏是也宗族稱孝鄉黨稱弟者如閔子騫人不間於其父母昆弟之言是也扶危難者如後漢劉翊見張季禮奔喪頃滯以車與之恤羈孤者如周楊修旅舍供過客而不受其報念乏絶者如張範為議郎救恤窮乏家無所餘中外孤寡皆歸焉通有無者如寇恂以所得祿賜厚施朋友故人危言切諫以申幽者如唐徐有功為司刑丞武后時周興來俊臣等搆陷無辜抵以極法有功議出之全活者數十百家以諫奏三經斷死而執悉不渝慎罰緩刑而全物者如漢丙吉為廷尉治巫蠱獄武帝聽望氣者言長安獄中有天子氣遣中使按天下獄無輕重皆殺之使夜至郡吉不納曰他人無辜死者且不可況皇曾孫在乎相守至天明不得入帝聞感悟囚赦天下是也田蚡漢丞相與魏其候竇嬰有隙誣嬰罪當死帝無殺嬰意蚡使人為飛語曰聞於帝遂殺之義縱漢定襄太守以鷹擊毛摯為冶掩獄中重罪二百餘人及賓客昆弟私入相視者亦二百餘人鞫為罰罪解脫盡殺之牛輔後漢人每見客先筮吉凶中郎將董越詣輔命筮之筮人常為越所鞭乃假以報曰不吉即殺越劉瑀宋吏部尚書與何偃有隙瑀發癕偃亦發疽瑀聞偃死歡躍呌呼於是亦卒夫善之積也修於身焉著於家焉逹於國與天下焉畫所為不愧於影夜所夢不愧於魂善之積於身者然也孝於親宗族稱之弟於長鄉黨稱之善之積於家者然也若夫扶人之危難恤人之羈孤念其乏絶通其有無以至申幽而全物則所積者不止在於身與家矣善積而德成如種植焉故謂之邁種德彼田蚡義縱牛輔劉瑀之徒殘忍肆虐怨毒存心人已交損則亦何益之有哉觀此善愈不可以不積矣雖然善積而名成非覬之也為善而近名必生事生事則釋公而就私置數而任已治不修故而事不須時其為善也與為非奚異有其善喪厥善知善之為善斯不善已釋公而就私者如後漢時甘陵周仲進與房伯武因所學不同二家賔客互相譏揣遂成尤隙由是甘陵有南北部是也置數而任巳者如後漢孔融為北海相自以智能優贍豪俊莫及欲舉軍耀甲與羣賢要功然所任用皆好竒異事無所濟治不修故者如宋王安石以治平自許創行新法天下騷然事不須時者如袁紹欲攻曹操田豐諫曰未可不如久待紹不聽果敗是也大善固不可不積矣然人果能積善名自隨之非可先有慕名之心然後為善以招而致之也茍為善而近於名必不能行所無事而生事矣生事則亦何所不至乎善本一世之公也而必欲挾為一已之私善本衆人之數也而必欲行其獨是之見故有當革亦有當因也而必不肯仍其故時不可後亦不可先也而必不能俟其時此皆覬名之心致之也將使世之人未享其為善之利而先受其為善之害則其為善與為非亦奚以異乎故善不可有也自有其善斯喪其善矣為善亦不必知也知善之為善斯不善矣積善者外去其名內去其知斯不有其善者乎斯能有其善者乎故君子慮善以動動惟厥時厚濟不居其惠多與不求其報功蓋天下不施其美澤及後世不有其名是之謂善積慮善以動動惟厥時見書説命篇君子知為善之不可以好名而好名者之流弊即入於不善也故慮善而後動謹其所積於內也動必當其時謹其所積於外也厚積於物不居其惠多與於人不求其報兢兢然不敢自謂善之已積也即至功蓋天下澤及後世人之視之以為善之至矣君子自視不過盡人之性以復天之命耳其於天人授受之初亳未有加也敢施其美而有其名乎禹之不矜不伐顔之若虛若無皆此志也天下惟無意於名者名必白歸焉是之謂善積積善者當以此準愛民章第二十二大道之行也選賢與能講信修睦使民老有所終壯有所用幼有所長矜寡孤獨廢疾者亦有所養男有分女有歸是謂大同夫上之視民猶赤子也赤子有欲呱呱弗能出諸口父母已意及之謹其乳保而察其寒煥赤子之欲斯適治民者亦然凡愛民者非私恩小惠之説也固有大道存乎其中矣大道之行也與天下公人之有德者賢也則選而任之有才者能也則與而用之所講習者誠信所修為者和睦使民有送死之具而老者有所終有養生之資而壯者有所用幼者有所長即矜寡孤獨廢疾之人亦不至流離而有所養土農工商各修其職男有分也嫁娶以正婚姻以時女冇歸也足以天下為一家不可謂之大同乎蓋其視民不以民視之而以赤子視之矣夫赤子始生即有所欲當其未適不能自言惟呱呱然泣耳為父母者愛之也切求之也不厭其勞不待其出諸口也即以己之意及之不惟意及之不遂已也必有事以適其意焉謹其乳保之託而察其寒燠之宜其養之也既得其人又得法赤子之欲斯無不適君子之治民亦若是則已矣君之心即百姓之心不必待百姓之自言也以不忍人之心行不忍人之政不徒意及之而已也慎選守令所以謹其乳保調劑寬猛所以察其寒燠也蓋必如保赤子然後可以為民父母耳養其生而弗傷厚其財而弗困節其力而弗極不煩不擾民自美安如鳥覆卵無形無聲而惟見其成持家之長惠及子孫撫運之君澤流天下率斯道也無形無聲惟見其成出管子持家之長四語出後魏甄琛表為人君者觀於父母之保赤子而得治天下之道焉夫民莫不欲夀順而夀之與民休息以養其生而不欲其傷也民莫不欲富順而富之斂從其薄以厚其財而不欲其困也民莫不欲逸順而逸之使從其時以節其力而不欲其極也如是則出令者簡要而不煩從令者寧一而不擾民自被其美而得所安矣如鳥之覆卵然人不覩其形也不聞其聲也惟日見其成而已蓋形聲之入人者淺道德之入人者深為治不在多言顧其力行何如耳父母為持家之長以實心愛子故慈惠及於子孫元后為撫運之君以實心愛民故潤澤流於天下皆率斯道耳天之愛民甚矣一物失所元氣為之舛盩故人勞則星動於天政乖則石言於國為人上者慎之哉唐堯加惠於民西伯施仁於無告漢文帝賑恤於孤寡明帝存養於篤癃可謂知先務矣星動者光武時中天星盡搖占曰民勞也石言者春秋時石言於晉魏榆晉侯問師曠曰石何故言對曰石不能言或憑焉怨讟動於人則有非言之物而言堯存心於天下加意於窮民一人飢曰我飢之也一人寒曰我寒之也周文王為西伯發政施仁必先於鰥寡孤獨窮而無告者漢文帝賜天下孤寡布帛絮各有差明帝賜天下篤癃粟人十斛夫人君愛民如愛赤子豈無所見而然也蓋民者生之於天天之愛其所生也不啻如父母之愛其子也諸子之中有一子不得其所則父母之心必為之惻然動矣萬物之中有一物不得其所則天之心亦為之側然動矣天之心不可見也而形於氣則有乖盩之變以示異焉故星動者民勞之徵石言者政乖所致天人感應之際捷於影響通於呼吸大可畏也為人上者當體仰天心俯合民心不可以弗慎也如唐堯之加惠西伯之施仁漢文之賑恤明帝之存養彼其於民無不愛也而必首及於窮困者誠知先務矣惻隱之心天人一理𢎞宥之道今古同風愛民者其尚知所法乎武都綏聚桐鄉恩遇清河涕沱懷州收瘞古之遺愛也彼郡無犬吠人稱卧虎誣民為叛違詔徴租所謂狼牧者歟夫鳥究則啄獸究則攫故財盡必怨力盡必叛周官六養齊政九惠悅以先民而民從之惠盎所以貴愛利者可思已漢虞詡為武都太守始至郡户才盈萬翊綏聚流亡二三年間增至四萬餘户宋邑為桐鄉嗇夫存問耆老孤寡遇之有恩後魏杜纂為清河內史尤愛貧老問民疾苦對之流涕後漢馬燧為懷州刺史收瘞暴骨漢王溫舒為河內太守捕郡中豪猾千餘家大者族小者死流血十餘里郡中無犬吠南齊蕭士開為益州刺史嚴用威刑人號曰卧虎後魏鄭伯猷為青州刺史誣良民為叛籍其資入已唐李實為京兆尹政猛暴有詔蠲租實違詔徴之六養者大司徒以保息六養萬民一慈幼二養老三賑窮四恤貧五寬疾六安富見周禮九惠者一老老二慈惠三恤孤四養疾五合獨六問疾七通窮八賑困九接絶見管子惠盎見宋康成公曰有道於此使人雖勇有力刺之不入擊之不中公曰善曰此猶辱也有道於此使人弗敢擊刺公曰善曰此猶有其意也有道於此使人無其意公曰善曰雖無其意未有愛利之心也有道於此使天下歡然皆欲愛利之公曰此寡人所欲得惠盎曰孔子是也孔子無地為君無官為長天下丈夫女子莫不願安利之萬乘之主誠志於此易於孔子多矣人君代天子民者也人臣代君子民者也愛民之道均不可以不講武都桐鄉清河懷州惠養其民猶有古遺愛之風彼溫舒輩縱溪壑之欲等草菅之視所謂使狼牧羊反為其害者歟夫鳥窮則啄獸窮則攫何況於人故斂不以節財盡則怨使不以時力盡必叛上不愛民民安能愛其上乎果能如周官之六養齊政之九惠以悅之道率先其民民未有不從之者上愛下下亦愛上理固然耳惠盎之告宋公四纍而上惟貴愛利有合大道之言良可思也慈幼章第二十三人之生幼而後長國之政先生聚而後教訓周禮大司徒以保息六養萬民一曰慈幼居則愛之故掌幼設官胎養賜榖患則恤之故禹書鑄幣唐詔酬資罪則原之故悼不加刑罰弗及嗣德綦厚制綦詳矣周禮六養解見前古者國都皆有掌幼之官士民有子或幼弱不能自養有三幼者無婦征四幼者盡家無征五幼又豫之葆受之人之食能事而後止見管子後漢章帝詔賜民胎養榖諸懷妊者人三斛復其夫勿算一嵗又嬰兒無親屬及有子不能養者廩餼之禹以厯山之金鑄幣贖民之無􅕷賣子者唐髙宗詔百姓遺棄男女有收養者聽量酬衣食之直放還本家悼者憐愛也見曲禮罰弗及嗣見禹謨凡人之生也不能頓長皆自幼始國之立政必先生聚而後教訓可施周禮大司徒之職以保息六養萬民而一曰慈幼然則幼者上之所加意培之以為國本者也古之人君有見於此故設官賜榖所以致愛於平居鑄幣酬資所以致恤於災患悼而不加以刑罰而弗及於嗣雖或有罪猶必見原不使纍及之是上慈幼之德愈加厚而所以慈幼之制愈加詳矣孰非重邦本之意歟越小國也恩遍於童子以能成霸故十嵗以下上所長也十一以上上所強也男子二十而始傅愛其力也越報吳成霸詳見吳越春秋十嵗以下見食貨志漢景帝令天下男子年二十始傅越勾踐之令曰將娩者告告令醫守之生男貺以酒犬生女賜以酒豚生子三人與乳母其恩之及於童子可謂遍矣用能十年生聚十年教訓以成霸業耳王者愛養斯民其慈幼之政豈反出霸者下哉故十嵗以下不能自長必待上有以養之而後長也十一以上不能自強必待上有以長之而後強也長矣強矣可以用矣而王者猶不甚驟用之也必待其二十而始傅焉其所以慈之者不亦至乎仲春之月奮木鐸以令於生子者子之將生也父使人日再問之擇於諸母求其寬裕慈惠慎而寡言者使為子師咳而名之獻諸州伯能食能言莫不有教愛而勞之親其賢而憐其無能慈之至也張裔置産朱暉受託崔琰撫恤孫權教養所謂兼愛者乎月令仲春之月奮木鐸以令兆民曰雷將發聲有不戒其容止者生子不備張裔與楊恭善恭早死遺孤未成人裔迎與分産而居及長為娶置産業後漢朱暉與同郡張堪為友堪卒妻子貧暉贍恤之魏崔琰友人公孫方宋階早死琰撫其遺孤恩若巳子吳凌統為將有功卒二子幼孫權收養宫中教之讀書乘馬常謂人曰此吾家虎子帝王之慈幼也不待其生而始然也木鐸之令所以訓誡其父母者蓋自未生之日而豫已慈之矣又制為禮節使其將生之際慰問有加既生之後保育有道夫婦之義父子之情不已兼盡乎至於能食則教以右手能言則教以男唯女俞既愛之不得不勞之凡所以教誨者無不至焉賢則親無能則憐父母於子慈之至也不幸而有喪其父母者則當委曲以成就之如張裔朱暉崔琰孫權輩真能不獨子其子而兼愛人之子者有裨風化匪淺鮮矣故君子有取焉夫人父生之君育之守令者宣上德而究之民者也武威革其妖忌陳國致其米肉任昉供資韓愈償直抑亦能其職矣茍坐觀入井而無怵惕惻隱之心其異於麻叔謀也不能以寸後漢張煥為武威太守俗多妖忌凡二月五月産子及與父母同月生者悉不舉奐示以義方嚴加賞罰風俗遂改駱駿為陳國相人有産子厚致米肉生男女者以駱為名梁任昉為義興太守嵗荒民散以私俸米豆為粥活三千餘人時産子者不能養昉供孕婦資糧濟者千室唐韓愈為袁州刺史州民以男女𨽻於人者愈悉計傭直而償出之隋麻叔謀為開河都護好啖嬰兒凶盜陶榔兒兄弟每盜以獻之夫人生之者父也育之者君也父能生之不能治之君能育之未必能遍及之與民最親者其守令乎守令者宣布上德而致之於民者也果存心於愛物何所不濟如張奐之革妖忌駱駿之致米肉任昉供孕婦之資韓愈償傭𨽻之直為民父母誠無忝矣苟不能宣上德而究之民聽其失所無以養之是猶坐觀赤子之井而漠然無所動其其中也忍心害理莫此為甚其視麻叔謀食人之子者相去不逺矣為守令者其審思之養生章第二十四大人以羣生為生以各遂為養呼吸元氣而天之熙熙於春臺黃帝所以永年也入海求藥祠竈化金甚惑滋甚養生者能弗損之斯益矣黃帝三百年見家語入海求藥者秦始皇遣方士徐市入海求蓬萊方丈瀛洲三神山之藥祠竈化金者漢武帝聽方士李少君言祠竈則致物而丹砂化為黃金可以益夀於是始親伺竈以上俱見通鑑夫大人者與天地合其德其生也不自以其生為生以天下之生為生也故其養生也亦不以自養為養以萬物各遂其養為養也氣之一呼與元氣出氣之一吸與元氣入而天下熙熙保合於一氣之中如當陽春之時而登髙臺之上渾然太和在宇宙間矣古之善養生者永年者首推黃帝非冇他術率此道爾秦皇漢武妄信方士之言或入海以求藥或祠竈以化金祗見其惑耳於養生竟何益哉故養生者不必外求所以益之也但能弗損於內即所以益之而永年之道在其中矣養而彌損者則以奉之過厚而用之過勤室大多隂臺髙多陽馳騁精神殫竭聰明皆生之纍也天地之大猶節其章光況於人乎生者有道之所慎也有慎之而反害之者不達乎性命之情也今夫人奉之於外者不必不厚也而不可過於厚用之於內者不必不勤也而不可過於勤茍聲色嗜欲誘之於外喜怒哀樂擾之於內內外交損豈養生之道乎且如室過大則必多隂臺過髙則必多陽馳騁其精神而不知休息殫竭其聰明而不知節嗇是皆生之纍也夫天地之道誠至大矣有陽必有隂有動必有靜有晝明必有夜晦有生長必冇收藏猶且節其章光不盡泄露何況人之一身乃過用其耳目過勞其心志久而不止寧無損耶觀於天地可以得養生之道矣故君子寧其身而天下平靜其心而天下治外不滑內則性得其宜性不攖和則德安其位全生之道也夫形恃神以立神恃形以存生之於人大矣夫子言語有節食息有宜明道以淑人垂訓而傳世亦以善其生爾夫子言語有節如寢不言食不語之類食息有宜如市沾不食狐貉以居之類詳見鄉黨篇君子之身天下之身之所取則也寧其身而天下平矣然必自靜其心始去知去故萬物無足撓其心者故靜也靜而與隂同德則動而與陽同波羣生顒顒各得所願天下有不治者乎夫身之所接者外也心之所存者內也身寧則外不亂其內足以定性斯性得其宜心靜則性不傷其和足以成德斯德安其位有德之人必得其夀全生之道無以逾此矣夫人形不獨立恃神以立神不獨存恃形以存生之於人所以存形而立神也其所係顧不大哉夫子大聖言語必合其節食息必循其宜明聖賢之道以淑人垂詩書之訓而傳世凡以教人調其形養其神靜其心寧其身與大道俱以為養天下之根是不獨以天下之生為其生而且以萬世之生為其生矣斯善其生者矣若夫潛山隱谷棄智黜聰雖復久視可成猶之養其一體必也君明臣良興化勤政所養乃大語有之流水不腐户樞不蠧養羣生者寧憚於勞心哉君明臣良興化勤政見陳摶答宋琪語夫所謂靜者非離動以為靜也若潛隱於山谷之中棄其智巧黜其聰明吐故而納新如安期羡門者雖可久視以延年然不過獨善其身弗能及人猶人於四體之中僅養其一體耳大人以羣生為生豈可若是必如陳摶之言君明於上臣良於下興起教化勤修政治斯所養不止一體而遍及天下乃為養生之大也語云流水不至於腐户樞不至於蠧以其動也養羣生者當靜而靜耳日心志不為紛華所搖當動而動以其身為天下樞而下令於流水之原寧憚於勞其心哉惟能治其心不過勞亦不過逸斯可以養一身可以養天下懲忿章第二十五以義度人則難為人以人望人則賢者可知故君子容以養德忍以濟事犯而不校從容以和所以敦恕而息爭也道不逺人故君子以人治人如必盡義以求人則精義之事非聖人不能其為人者不亦難乎惟以人之常道望之於人不失其所以為人即可以為賢則賢者可得而知也君子視天下無不可為賢者之人故於人無所不容亦無不可為賢者之事故於事無所不忍能容天下之人其量斯廣所以養一巳之德也能忍一己之性其功乃成所以濟天下之事也即橫逆之來置而不校惟從容不迫以和於衆焉以我之心推人之心而恕道以敦則人之心亦將猶我之心而爭端以息何忿之不可懲乎文書釋咎箭笴蠲嫌誠帝王之休德矧分在臣民而忿戾以逞乎茍性情宕佚血氣方剛任其所偏罔知裁制輕俠成俗則睚眥必讐議論分曹則抑揚逾實甘為怨府以長厲階漢唐而降澆風接踵誠仲尼所謂惑也東漢光武克邯鄲誅王郎收其文籍得吏人與郎交關書數千章皆命焚之曰令反側子自安後唐莊宗與梁戰於河上梁將陸思鐸射帝中馬鞍帝拔箭覩其名識之後平梁思鐸來降伏地請罪帝慰而釋之尋加任用輕俠成俗者如漢郭解布衣任俠以睚眥殺人有儒生謂解姦犯公法解客聞之即斷其舌議論分曹者如漢公族進階魏齊卿等危言深論激揚名聲公卿以下莫不畏其貶議唐李吉甫惡牛僧儒李宗閔等對䇿功直其後吉甫子李德裕與李宗閔各分朋黨更相傾軋宋程頤多用古禮蘇軾謂其不近人情每加玩侮在朝者各以其類相從遂分三黨洛黨首程頤蜀黨首蘇軾朔黨首劉摯互相訾議是也帝王之大度者如光武釋文書之咎莊宗蠲箭笴之嫌皆能有容是謂休德況於臣民尤當各安其分豈可忿戾以逞乎茍任性情縱血氣一往而遍不知以忍裁之輕俠者報睚眥之讐議論者失抑揚之實取怨於人貽害於巳或以身徇或以國亂漢唐之末習俗相沿澆漓極矣雖在賢豪或不免焉仲尼有言一朝之忿忘其身以及其親非惑歟此之謂也惟能懲之斯不惑耳夫祁奚舉善為其可嗣若藉以釋憾則矯枉失中必恩怨渾忘惟國是務乃和而不同者乎婁師德公孫𢎞王旦庶幾近之若夫蠶女爭桑而搆兵亭人灌瓜而稱謝安危之幾介於絲髮與其遇患而思懲曷如夙懲而無患歟祁奚晉大夫請老晉侯問嗣之者奚舉其仇解狐君子謂奚能舉善矣唐劉仁軌與袁異式有怨後為太司憲異式不自安衆論紛然仁軌即薦為司元大夫杜易簡曰人曰斯所謂矯枉過正者也婁師德唐臣嘗薦狄仁傑而仁傑不知數擠之於外仁傑後知之歎曰婁公盛德我為其所包容久矣公孫𢎞漢丞相食一肉脫粟飯汲黯曰此詐也武帝問𢎞𢎞曰有之若無汲黯忠陛下安得聞此言王旦宋真宗時參知政事常稱寇準帝曰卿雖稱其美彼専談卿惡旦曰臣在相位久政事缺失必多準對陛下無隱益見其忠此臣所以重準也爭桑者楚邊邑女與吳邊邑女蠶爭界上之桑二家搆怨以致吳楚相攻灌瓜者梁楚鄰界邊亭皆種瓜梁瓜美楚瓜惡楚亭人怒而夜往搔梁之瓜梁人欲報之以請於縣令宋就就不可夜令人代楚灌瓜楚王聞之大愧謝以重幣而請交於梁夫臣民之忿固不可以不懲然懲之是也非矯之也奚之舉狐誠為其善可以繼已之職有益於國若不必其善而惟借以釋憾如仁軌所為未免矯枉而失其中矣故為臣者不可市恩亦不必避恩不可結怨亦不必釋怨惟有益於國然後舉之乃所稱和而不同者乎師德輩有容人之度有忍事之心庶幾近此可以取法若夫吳楚之蠶女梁宋之亭人其事皆起於民也一以不能懲忿而致搆兵則二國皆危一以能懲忿而致稱謝則二國皆安是安危之幾在能懲不能懲之間耳夫患則思懲懲則無患與其遇患而懲懲且無及曷若懲於未患患永不作此懲忿者所當深思也窒欲章第二十六多欲者必放於利放於利必重賄賄聚於公則國敝聚於私則家危長國家者輕財賄而嗜令名斯欲而不貪矣凡人之欲莫先於利利莫大於賄茍不能窒之而至於多欲則必専求利専求利則必重聚賄然賄不聚則已聚於公則上行下效而國為之敝矣聚於私則多藏厚亡而家為之危矣夫聚賄所以求利也而至於敝且危利乎不利乎故長國家者非無賄之患而無令名之難誠能以財賄為輕不務聚之而惟令名是好雖好名之心亦欲也然而非貪矣即謂之無欲也可飲食男女節之以禮耳目娛適授之以度謀慮經營範之於道以率其下而民從之公孫僑之相鄭也桃李之垂者莫不援錐刀之遺者莫之舉幾於賞之而弗竊焉秦人觀寶楚國蒞以羣賢梁惠瑋珠齊威稱其千里誠審所欲也子産相鄭十八年桃李之垂於行者莫之援也錐刀之遺於道莫之舉也見吕覽秦君使使者觀楚之寶器楚王召照奚恤而問焉對曰此欲觀吾之得失而圖之也遂為壇與子西子方子髙子反以次立使者至奚恤曰客觀楚國之寶器所寶者賢臣也理百姓實倉廩子西在此奉圭璋使諸侯子方在此守封疆謹境界子髙在此理師旅正兵戎子反在此惟大國所觀使者反告秦君曰楚多賢臣木可謀也見新序梁惠上謂齊威王曰寡人之國雖小有徑寸珠照車前後十二乘者十枚威王曰寡人所寶與王異吾臣冇檀子守南城楚不敢寇盻子守髙唐趙不敢漁黔夫守徐州燕祭北門趙祭西門種首備盜賊道不拾遺以此為寶將照千里豈特十二乘哉見史記窒欲者先從為民上者始彼飲食男女欲之在物者也節以禮而不過焉耳目娛適欲之在身者也授以度而不忒焉謀慮經營欲之在心者也範以道而不踰焉本諸身者由顯入微微諸民者自近及逺上以此率下以此從共遵其禮秉其度守其道雖賞之使竊亦有所不欲矣公孫僑之治鄭也庶幾近此至若楚寶羣賢齊寶四臣二國賴以不敝且有令名至今稱焉謂非能審所欲者乎故牧民者秉義黜利亷儉是先亷則絶私儉則寡慕伯武詢絹隱之酌泉裴潛挂牀孔奐却被皆確乎不拔以道化人民愜所願而無競心窒已之欲以能窒人之欲其利溥矣胡威字伯武父質為荆州刺史威往省之父賜絹一匹威曰大人清髙不審於何得此父曰是吾俸祿之餘乃受之威後為徐州刺史亦如父清吳隱之為晉陵太守清亷遷廣州刺史州有貪泉飲者多懷無厭之欲隱之酌飲因賦詩曰終當不易心愈勵清操裴潛為兖州刺史嘗作繩牀及其去也留以挂柱孔奐為晉陵太守居處儉索所得秩俸分贍孤寡富人殷綺餉被一具奐却之曰太守身居美祿何為不能辦此但民有未周不容獨享耳司牧民之任者尤不可不審所欲也義之與利不容並立必秉義黜利而惟亷儉是先亷則無私於人人亦不敢干以私儉則無慕於物物亦莫能動其慕如伯武隱之裴潛孔奐皆能審於義利之辦確然自守而不可拔者是以政平而訟理吏肅而民服道化及人愜其所願各安於義而無競利之心是不獨窒已之欲而且窒人之欲矣其利不亦溥乎始乎黜利終乎利溥義未常不利也然必黜之乃能溥之是在秉義者耳徇利之夫厚顔斯甚割剝萌庶讐斂貨財見金而不見人知得而不知喪欲盈惡稔而顛隕隨之故傳曰象有齒以焚其身賄也徇利厚顔者如唐張嘉貞為定州刺史製恆嶽廟碑文時逺近祈賽錢百萬嘉貞自以為文之功納其數萬割剝萌庶者如梁王筠為臨海太守侵刻芒屩兩舫他物稱是讐斂貨財者如鄭伯猷為青州刺史貪婪貨賄潤及親戚户口逃散邑落空虛乃誣民為叛籍財入已有攫金於市者見金而不見人如江祿為武寧郡守積錢於壁壁為之倒迮銅物皆鳴人戲之曰所謂銅山西傾洛鍾東應者也知得而不知喪者如後唐李存儒為衛州刺史誅斂州民防城之卒皆徵月課縱其歸去將將段凝乘夜陷城存儒不覺惡盈顛隕者如後魏元㲹為營州刺史貪殘人不堪命相率逐之象有齒以焚其身見左傳徇利之人既喪其心何有於顔割剝讐斂無所不至殊不知人之議其後也而喪已隨之矣至於顛隕果何利乎象以齒斃其身人以賄殞其軀一而已矣惟不窒欲故至於此稍知愛身者可不以賄為戒耶履謙章第二十七登山者處已髙矣左右視尚髙於己非他山盡髙目則然也立身者行已賢矣左右視尚賢於巳非他人盡賢心則然也君子卑以自牧正內愜其心爾易謙卦地上山下夫地本卑而畫卦乃在山之上山本髙而畫卦乃在山之下君子之存心如此謙之義也故觀於登山可以得謙之象焉凡人之登山者所處已髙矣乃左右視尚有髙於己之處豈必他山之盡髙哉目所見則然也立身者所行巳賢矣乃左右視尚有賢於己之行豈必他人之盡賢哉心所存則然也道義無窮學識有限自以為髙則已卑矣自以為賢則已愚矣謙謙君子卑以自牧匪為是聲音笑貌以塗飾人之耳目也政以行其心之所安耳愜於心斯能見於履矣慮存正已色不矜人智而能愚勇而能怯位髙而意下祿厚而志約功懋承之以畏德盛持之以恭保善於己成防愆於未發懷自盈之懼恥過實之聲見君子之心焉夫君子自愜其心則亦焉往而不謙乎積於慮則存正已不見已之有餘現於色則不矜人不見人之不足聰明睿智守之以愚不自詡其智勇力震世守之以怯不自恃其勇其位愈髙其意愈下不以貴而驕其碌彌厚其志彌約不以富而舒功既懋矣承之以畏而不敢自伐其功德既盛矣持之以恭而不肯自矜其德善雖已成思所以保之恐成而鄰於敗愆雖未發思所以防之恐發而不及收懷自盈之懼者知盈之不可久恥過實之聲者知名之不可居謙德如此孰非君子之所履乎而君子之心於是乎見矣故禮觴酒豆肉讓而受惡則民不犯齒袵席之上讓而坐下則民不犯貴善稱人過稱已則民不爭善稱尊過稱已則民忠孝謙之為益𢎞矣哉君子以謙存心而見之於履則動容周旋中禮矣且不獨履而已也禮始諸飲食觴酒豆肉讓其美而受其惡六十以上必有加則民衆著於老老之義而不犯齒矣禮行於居處袵席之間讓其上而坐於下三命以上必異席則民衆著於貴貴之義而不犯貴矣至若有善歸之於人有過歸之於巳則民衆著於賢賢之義而不爭冇善歸之於上冇過引之於巳則民衆著於敬上之義而忠順親之義而孝由斯以觀君子所履小民所視也君子自謙而天下之人胥化於謙禮教於是乎興焉謙之為益不亦大乎天子有善讓於天卿大夫有善歸於君士庶人有善本諸父母率是道耳江海之為百谷王者以其能下易曰勞謙君子萬民服也漢光武魏孝文以之郤克叔痤戰勝而讓功孔霸伊馛恩加而辭位樊宏魂慚於食邑無忌心怵於要樞其亦知所履乎王渾表奏何如亷頗之負荆至於僧達焚牀子顯撝扇皆以量缺虛容致貽嫌咎傲不可長信夫漢光武詔百僚上封事不得言聖後魏孝文有事方澤時大暑遇天雲蔭密咸陽王禧稱為德感帝曰洛陽天地之中隂陽交會自然之應豈朕寡德所致郤克晉大夫將中軍敗齊師於鞍公勞之曰子之力也夫對曰君之訓也二三子之力也臣何力之有焉公叔痤魏將敗韓趙之師王郊迎賞賜百萬痤反走拜辭曰此吳起餘教也臣何力之有乎王曰善索吳起後賜田二十萬漢孔霸宣帝時為大中大夫嘗稱爵位太過何德以堪帝欲相霸自陳至三乃許之後梁伊馛為振威將軍太武欲拜為尚書郡公馛辭曰尚書務殷公爵至重非臣所能荷任樊宏漢光武舅封夀張侯自陳無功享食大國魂神負慙願還封食邑小鄉亭唐長孫無忌文德皇后兄為尚書右僕射深誠滿盈懇辭機務王渾晉臣與王濬伐吳以濬先入建業受孫皓降甚慙忿與之爭功表濬違詔不受節度亷頗趙將初以藺相如位在己右欲辱之相如不與爭望見輒引避且曰吾所以為此者光國家而後私仇也頗聞之負荆謝罪王僧達為中書令時黃門侍郎路瓊之乃路慶之之孫也盛服往見適僧逹將獵已改服謂瓊之曰昔吾騶人路慶之是君何親因焚所坐牀竟以召禍蕭子顯為吏部尚書負其才氣見賔客不與交言但舉扇一撝人皆恨之君子知天下之不可上也故下之然謙之為道雖卑而實尊故人未有能上之者若江海然以其善下故能為百谷王也易之所云君子有功勞而能謙萬民所服光武孝文為天下君不自滿假庶幾得此義乎郤克叔痤功臣也而謙孔霸伊馛大臣也而謙樊宏無忌戚臣也而謙其皆知履謙之道者歟彼王渾奪人之功與亷頗悔巳之過賢不肖相去逺矣僧達子顯器小易盈自貽伊戚傲不可長不信然耶倪履考祥惟謙終吉君子不可不知務也謹言章第二十八精喻者不待言不獲已而有言榮辱分矣居室之詞應乎千里幾事不密至於害成君子所以慎密而弗出也口之溺人也甚於淵故言必稽其所終聽必原其所始豈特金人之慎哉周太廟有金人三緘其口而銘其背曰古之慎言人也詳見家語天何言哉時行物生不言而喻也人之天機每發於未言之先能以精微相喻則不待於言是無言之言天下之至言也然人不皆能精喻於是不得已而有言為榮為辱逈然分矣居其室出其言善則千里之外應之謹之得也何榮如之幾事不密則害成不謹之失也何辱如之君子所以慎密而弗出匪終弗出也以不得已之心為不得已之言謹之至也且不但謹於立言又當謹於聽言今淵能溺人口更能溺人溺於淵猶可遊也溺於口不可救也故言之者必稽其所終成敗了然乃可以底績聽之者必原其所始貞邪立辨乃可以見心皆所當致謹者也豈但如金人之慎緘其口而已耶宋景動天漢文懷逺郤虎勝敵千秋悟君善言之效也深而弗露者仲尼以不應為答周公以不聞為納匿而反彰者東郭觀形於臂舉衛姬望色於足髙故口有不言之謀耳有無聲之聽其不可忽如此矧頰舌之間乎宋景公時熒惑守心宿乃宋分野公憂之子韋曰可移於相公曰相吾之股肱曰可移於民公曰君者待民曰可移於嵗公曰嵗飢民團吾誰為君子韋曰天髙聽卑君有君人之言三熒惑宜有動候之果徙三度漢文帝時南越王他稱帝文帝賜他書詞甚謙遜他遂稱臣郤虎晉臣言勝鄴之䇿於趙衰文公用之而勝衰曰臣謀本於郤虎公因賞虎田千秋漢武帝臣衛太子為江充譛敗千秋力訟其寃帝因感悟白公欲作亂問孔子曰人可與微言乎孔子不應曰以石投水奚若孔子曰善沒者能取之曰以水投水奚若孔子曰淄澠之合易可能知之曰然則人不可與微言乎孔子曰胡為不可惟知言者可耳此孔子默止白公之作亂也勝書説周公曰延小人衆徐言則不聞疾言則人知之徐言乎疾言乎公曰徐言又曰冇事於此精言之而不明勿言之而不成精言乎勿言乎公曰勿言此勝書默説周公之伐紂也齊桓公與管仲謀伐莒謀未發而聞於國公曰日有役人上視意者其是也令復役東郭牙至仲曰子何故言伐莒對曰日者望君在臺上手足矜有兵革之色舉臂而指所當者莒也口呿而不合所言者莒也桓公又與仲謀伐衛退朝衛姬下堂再拜請衛君之罪公曰吾於衛無故子曷為請曰妾望君之入足髙氣強伐國之志也見妾有動色伐衛也明日公朝管仲曰君舍衛乎公曰安識之曰君之揖朝也恭而言也徐見臣而有慚色是以知之夫君子謹言則其言善矣一善所格天可動逺可懷敵可勝君可悟如宋景公輩善言之應豈不信哉且有人不言而我已知者如仲尼於白公以不應應周公於勝書以不聞聞皆深隱而弗露者也有我不言而人已知者如東郭細民也觀臂舉而知伐莒衛姬婦人也望足髙而知謀衛是欲匿而反彰者也故言未出於口已有不言之謀未入於耳已有無聲之聽其機如此豈可匆諸况已動於頰舌之間者又何可以不謹也宋使之報寇避害而趨利澄子之援衣覩形而忘實惠子之却炬交淺而談深言乃為天下病楊惲何綏禍成於簡傲京房張宿獲戾於漏泄始知安世佯驚魯恭潛益陸元方緘封之匣李德裕精思之亭咸慎厥樞機可為楷範矣齊攻宋王使人候之使還曰寇近矣王怒殺之如此者三後又使人往報曰殊不知寇所在王喜賜之金寇至王馳走此人得以富於他國澄子春秋時人亡緇衣見婦人衣緇援而弗舍婦弗與澄子曰子不如速與我昔吾亡紡緇今子禪緇以禪緇易紡緇子豈不得哉惠子新與白圭相見説之以強白圭語人曰冇娶新婦者婦至童子操蕉火而炬新婦曰火太巨入門冇斂陷新婦曰塞之恐傷人之足言非不便也然有太甚者今惠子之説我有似於此楊惲漢平通侯免爵家居內懷不服報友人孫會宗書語涉怨望按驗坐罪何綏晉侍中尚書性輕物翰札簡傲後為東海王所害京房漢元帝時為郎與張博親每見輒道上意及諸災異事後石顯告房與博通謀誹謗得罪張宿唐憲宗時居諫列以機事不密貶彬縣丞漢張安世領尚書事謹慎周密每議大政已決輒移病出聞詔佯驚使吏之丞相府問焉魯恭為三公性謙退奏議依經潛有補益唐陸元方為相清謹所奉勑書手自緘封藏於一匣家人莫有見者李德裕為相於私第中别搆精思亭每有大事獨處亭中凝然握管左右無得預夫能謹言者必能知言故羣言淆亂不可不察如宋使之言躁也適以誤國澄子之言謬也輒以誣人惠子之言躁也適以辱身其為天下病一也或不能辨亦聽言者之過歟至於楊惲何綏以簡傲召禍京房張宿以漏泄獲戻不謹之害凜乎可畏然後愈知言之不可以不謹也安世魯恭元方德裕皆知慎其言者良可法耳夫居其位不可無其言故鄭重四賢魯矜一諾周襄却請隧之妄王孫折問鼎之姦莫不藉為命以安邦託立言而不朽雖復謹之又謹其亦有不獲巳者歟鄭國之辭命禆諶草創世叔討論子羽修飾子産潤色應對諸侯鮮有敗事小邾射以句繹奔魯曰使季路要我吾無盟矣子路辭康子謂之曰千乘之國不信其盟而信子之言子何辱焉對曰彼不臣而濟其言是義之也由弗能晉文公定襄王於郟勞以地辭請隧焉弗許曰王章也未冇代德而有二王亦叔父之所惡也遂不敢請楚子伐陸渾之戎至於洛定王使王孫滿勞之楚子問鼎之輕重大小焉對曰在德不在鼎德之休明雖小重也其姦回昏亂雖大輕也君子之道或出或處或默或語惟其時耳茍居其位而不言誰代之言者故當言而言如四賢之為辭命不當言而不言如季路之重然諾正言以却妄如周襄王嚴辭以折姦如王孫滿用之當世則贊訏謨以安邦垂之後人則偕德功而不朽雖未嘗因言而弛謹亦未嘗因謹而廢言也蓋以不獲己之心立言此言之所以有益於天下也歟慎行章第二十九進德修業淑身以接物者其惟行歟一念肆而庶事乖一刻忽而終身悔甚哉不可以不慎也君子不患人之非己也不為可非之行而已遵道而行待時而動斯行無不宜敬以直內義以方外斯行無所疑慎也者行之所以成始而成終也詩曰小心翼翼古訓是式詩大雅蒸民之篇言仲山甫之心能極其敬而以古訓為法也凡行備於身謂之德見於世謂之業君子進德修業淑善其身以交接於物者舍行將奚以哉一念少肆遂致庶事之乖一刻少忽即貽終身之悔制行者其可以不慎乎故君子求諸己不求諸人人之非己不足患也但慎於己使無可非之行而已遵道而行非道不敢行待時而動非時不敢動斯行而咸宜矣內主於敬則內無不直外主於義則外無不方斯行無所疑矣然則慎也者所以成行之始成行之終不可以不免也詩所云小心翼翼古訓是式者其是之謂歟夫行起於幾微而動乎天地吉凶以之生故修政而桑枯録寃而雨澍受脤失敬執玉乖容貌之不恭遂為身咎況恃勢以自専怙權而虐物貽譏賈禍豈其不幸乎商大戊時有桑生於朝七日大拱王懼修明先王之政三日而桑枯東漢和帝時京師旱乃録囚徒舉寃獄未及還宫大而周大夫成肅公受脤於社不敬劉康公曰人受天地之中以生所謂命也是以有動作威儀之則以定命也今成子隋棄其命矣邾隱公朝於魯執玉髙其容仰定公受玉卑其容俯子貢曰髙仰驕也卑俯替也驕近亂替近疾後周鄭譯尚梁國公主頗専權擅取公材以營私第坐是除名唐薛諗為尚衣奉御性貪忍嘗使奴誘殺販繒帛者而取其貨事泄流瀼州此恃勢自専者也北齊髙敖曹為司徒嘗詣相府門者止之敖曹怒引弓射門者後唐盧程為平章事使晉陽山路險阻程安坐肩輿州縣長吏驅率丁夫迎謁拜伏少有忤意即加笞辱此怙權虐物者也夫行者君子之所以動天地者也故雖幾微有其應惠迪則吉從逆則凶如影響焉商修政而桑遂枯漢録寃而雨即降善行之吉既有明徵矣成肅公之受脤邾隱公之執玉貌之不恭似亦幾微爾遂為災咎天人感應之際良可畏也況夫恃勢怙權専恣暴虐者貽譏以敗名賈禍以辱身凶咎之來良由自取非不幸也慎行者執虛如執盈入虛如有人蘧伯玉有之河間東平藩屏之令器曹參孔明輔弼之碩德抑其倫也夫狂者走逐者亦走懼者顫寒者亦顫乃同形而異實亷者貧貧者未必皆亷忠者死死者未必皆忠乃同事而異情觀行者審諸衛靈公夜坐聞車聲至闕而止過闕復有聲夫人曰此必蘧伯玉也賢者不以暗昧廢禮使人偵之果然漢河間王德身端行治篤敬愛下被服造次必於儒者後漢東平王蒼少好經書率禮不越明帝問以處家何等最樂對曰為善最樂曹參為相一遵蕭何之法無所變更擇郡國吏謹厚者用之刻深務名者輒斥去蜀諸葛亮將伐魏與諸將謀魏延請以精兵五千出褒中當子午谷而北不十日可到長安亮以此為危計不用凡慎行者必謹於細乃可以全其大必嚴於獨乃可以孚於衆故執虛器如執盈物無微不可忽入虗室如有人心無地而不存若伯玉者不為昭昭伸節不為冥冥墮行有君子之道矣河間東平藩屏之能慎行者也曹參孔明輔弼之能慎行者也庶幾伯五之儔乎然行之異者易辨同者難辨如病狂者東四妄走逐者非狂也隨之走有似於狂懷懼者手足俱顫寒者非懼也當其顫有似於懼其形雖同其實則異矣亷者外不取於人內不營其産故貧而貧者或靡費以耗財或矯偽以干譽則未必皆亷忠者臨陳不顧其身直言不避其禍故死而死者或失養以傷生或犯法而獲罪則未必皆忠其事雖同其情則異矣是不獨制巳之行當慎即觀人之行亦當慎也可不審哉愛物章第三十天地欣合煦嫗覆育而滋萬物故君子之用物也有不可廢之禮而有不忍盡之心鳥獸之肉足登於俎皮骨毛羽足供於器物具而罔有過求愛已行乎其中矣孳尾紀於堯書攸居著乎禹貢商開三面之網周憐屋上之烏抑仁政之施乎堯命義仲察鳥獸之孳尾因其生育以驗春氣之和禹治水洲渚既平隨陽之烏得其居止而遂其生湯始見人張網者置四面令解其三面祝曰欲左者左欲右者右欲髙者髙欲下者下不用命者入吾網武王登夏臺以臨殷民周公曰愛其人者愛其屋上烏凡物之生本於天地蓋自天道下濟地道上行一隂一陽交合欣暢天以氣煦地以形嫗天以髙覆地以厚育渾然太和在宇宙間而萬物滋生於其中皆天地之所愛也君子體天地之心以為心雖祭饗軍賓禮之所在不敢或廢勢必有需於物但於用物之中有不忍盡用之意鳥獸之肉取於足登於俎皮骨毛羽取其足供於器具而即止罔有過求是愛物之道已寓於用物之中禮與心並行不悖矣如堯察孳尾禹紀攸居商湯解網周公憐烏皆以不忍之心行不忍之政者謂非仁之施乎誠與天地合其德者也竭澤而漁非不得魚而明年無魚焚林而獵非不得獸而明年無獸制之以節斯民用弗窮禮諸侯無故不殺牛大夫無故不殺羊士無故不殺犬豕犬焉雖微猶施帷蓋詎有暴殄之失哉君子不忍之心所以教民節用也彼竭澤而漁者盡乎漁之利矣非不得魚然魚既盡則明年將無魚焚林而獵者盡乎獵之利矣非不得獸然獸既盡則明年將無獸甚矣物之不可盡也惟制之以制斯取之有道用之不竭仁也而禮存焉諸侯大夫士皆當秉禮者也茍無行禮之事則不殺牛羊犬豕位自尊以暨卑物自大而及小無不範於禮即無不被其仁至若犬馬雖微於其斃也猶冇帷蓋之施以示憐恤之意則其於物又豈忍用之無度哉暴殄之失知其免矣齊矜觳觫宋避螻蟻仁之端也單父舍夜得之魚中牟馴將雛之雉可以觀治焉蕭宏食品充盈朱異珍羞腐敗識者所譏若梁武之麵為犧牲則愛物而廢禮異乎夫子之存餼羊矣齊宣王不忍牛之觳觫以羊易之宋程頤請於哲宗曰聞上起行潄水必避螻蟻有之乎上曰然誠恐傷之爾頤曰願陛下惟此心以及四海宓子為單父令巫馬期往觀其化見夜漁者得而舍之問其故曰宓子不欲人之取小魚也故舍之漢魯恭為中牟令小兒不捕雉曰雉方將雛蕭宏縱恣無度珍膳盈溢食不能盡棄之道路朱異厨下珍羞腐爛每月棄十數車雖諸子别房亦不分贍二人俱梁臣梁武帝事佛不如葷以麵象犧牲之形供祭祀子貢欲去告朔之餼羊子曰我愛其禮夫仁貴于施齊宣王矝牛宋哲之避蟻不忍之心見其端矣偕未能擴充以施于政耳單父舍魚中牟馴雉即下之不忍見上之不忍豈不可以觀治乎蕭宏朱異暴殄天物識者譏之若梁武以麵為牲則所全于物者小而所失于禮者大非無敝之道也其與夫子愛禮存羊豈不大異乎愛物者不廢禮亦不傷仁當以聖人為法御定資政要覽卷三
